name: Build Plugin
on:
  push:
    branches: [main]
    paths:
      - 'src/sdd/**'
      - 'factory/sdd/.agent-templates/**'
  pull_request:
    paths:
      - 'src/sdd/**'
      - 'factory/sdd/.agent-templates/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - run: bash src/sdd/build.sh
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claude/sdd/ factory/sdd/droids/ factory/sdd/.factory-plugin/
          git diff --cached --quiet || git commit -m "build(plugin): auto-build claude/sdd/ from src/sdd/ [skip ci]"
          git push origin HEAD
