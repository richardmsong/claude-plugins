  supersedes: methodology.registry.verifier_field
  glossary_terms: []
  status: active

- id: methodology.validator.registry_status_field
  definition: The validator `CheckRegistryStatusField` returns a `CheckError` for every registry entry whose `status` field is not one of `active` or `withdrawn`; returns no error for entries with a valid status.
