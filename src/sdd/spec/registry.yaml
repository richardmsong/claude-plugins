- id: methodology.validator.interface_file_purity
  definition: The validator `CheckInterfaceFilePurity` returns a `CheckError` for every file matching `*_interface.go` (under `<project>/spec/` or `<project>/cmd/sdd/`) that contains a `type X struct { ... }` declaration; returns no error when interface files contain only interface declarations and type aliases.
  verifier: spec/checks_validator_test.go::TestCheckInterfaceFilePurity
  requires:
    - methodology.validator.test_shape_unit_only
  glossary_terms: []
  status: active

- id: methodology.validator.no_test_scaffolding_types
  definition: The validator `CheckNoTestScaffoldingTypes` returns a `CheckError` for every struct type declared in a `*_test.go` file (under `<project>/spec/` or `<project>/cmd/sdd/`) whose method set in the same file is a superset of any interface declared in a `*_interface.go` file in the same module; returns no error when no test file defines a concrete methodology-interface-satisfying type. Detects `noopValidator`, `stubValidator`, `fakeValidator`, and any naming variant by structural method-set matching. Generic test mocks of unrelated interfaces (e.g. external libraries, HTTP clients) remain allowed because those interfaces aren't declared in `*_interface.go` files.
  verifier: spec/checks_validator_test.go::TestCheckNoTestScaffoldingTypes
  requires:
    - methodology.validator.test_shape_unit_only
    - methodology.validator.interface_file_purity
  glossary_terms: []
  status: active

- id: methodology.validator.no_production_satisfaction_assertions
  definition: The validator `CheckNoProductionSatisfactionAssertions` returns a `CheckError` for every package-level `var _ <Identifier> = <expr>` declaration in a non-`_test.go` `.go` file (under `<project>/spec/` or `<project>/cmd/sdd/`) where the identifier resolves to an interface type in the package; returns no error when all interface-satisfaction assertions live in test code only.
  verifier: spec/checks_validator_test.go::TestCheckNoProductionSatisfactionAssertions
  requires:
    - methodology.validator.test_shape_unit_only
  glossary_terms: []
  status: active

# 12. Dashboard (2 entries)
- id: methodology.dashboard.respects_configured_paths
  definition: When `boot()` resolves the docs directory, it reads `<docsRoot>/spec-driven-config.json` if present and uses `config.spec.adr_dir` as the `docsDir` passed to `startWatcher` — resolved relative to docsRoot when not absolute, used as-is when absolute, honored even when the resolved path does not exist on disk; falls back to `<docsRoot>/docs/` only when the config file does not exist or `spec.adr_dir` is missing, empty, or whitespace-only; throws when the config file is present but contains malformed JSON.
  verifier: src/sdd/docs-dashboard/tests/boot-config-respect.test.ts
  requires:
    - methodology.validator.config_spec_adr_dir
  glossary_terms: []
  status: active

- id: methodology.dashboard.banner_shows_resolved_docs_dir
  definition: The dashboard's startup banner includes a line of the form `Docs dir: <resolved-path>` where `<resolved-path>` is the same `docsDir` value `boot()` passes to `startWatcher`.
  verifier: src/sdd/docs-dashboard/tests/server-banner.test.ts
  requires:
    - methodology.dashboard.respects_configured_paths
  glossary_terms: []
  status: active

- id: methodology.dashboard.blame_uncommitted_lines_structured
  definition: The `/api/blame` response's `uncommitted_lines` field is an array of objects each with `line_start` (positive integer), `line_end` (positive integer at-least `line_start`), and `kind` (`"added"` or `"modified"`), computed from `git diff HEAD -- <file>` when `repoRoot` is available, or `[]` when it is not.
  verifier: src/sdd/docs-dashboard/tests/routes-blame.test.ts
  requires:
    - methodology.dashboard.respects_configured_paths
  glossary_terms: []
  status: active

- id: methodology.dashboard.diff_endpoint_three_modes
  definition: '`/api/diff` returns the working-tree-vs-HEAD diff for the doc when invoked with `working_tree=1` and no `commit`; returns the full-file commit-vs-parent diff when invoked with `commit=<hash>` plus both `line_start`/`line_end` absent; returns the range-scoped commit diff (existing ADR-0040 behavior) when invoked with `commit=<hash>` plus both `line_start`/`line_end` present; returns HTTP 400 for any other parameter combination including partial-range (exactly one of `line_start`/`line_end` present), missing `doc`, or invalid commit hash.'
  verifier: src/sdd/docs-dashboard/tests/routes-diff.test.ts
  requires:
    - methodology.dashboard.respects_configured_paths
  glossary_terms: []
  status: active

- id: methodology.dashboard.overlay_parser_classifies_lines
  definition: '`parseUnifiedDiff(diffText)` returns an array of `DiffLine` records where every `+` line in the input produces a record with `kind: "added"`, every `-` line produces a record with `kind: "removed"`, every context line (single-space prefix) produces a record with `kind: "context"`, with `lineNo` on each record matching the right-hand-side line number from the diff''s `@@` hunk header for added records, the right-hand-side line number for context records, the left-hand-side line number for removed records.'
  verifier: src/sdd/docs-dashboard/tests/overlay-model.test.ts::parseUnifiedDiff
  requires: []
  glossary_terms: []
  status: active

- id: methodology.dashboard.overlay_merger_synthesizes_removals
  definition: '`computeOverlay(diff, baseLines)` returns an `OverlayLine[]` where added lines from the diff render with `kind: "added"` carrying the new-file line number as `baseLineNo`, context lines render with `kind: "kept"` carrying the new-file line number as `baseLineNo`, removed lines from the diff are inserted into the sequence with `kind: "removed"` plus `baseLineNo: null` at the position immediately following the preceding kept-or-added neighbor in the diff''s old-file ordering.'
  verifier: src/sdd/docs-dashboard/tests/overlay-model.test.ts::computeOverlay
  requires:
    - methodology.dashboard.overlay_parser_classifies_lines
  glossary_terms: []
  status: active

- id: methodology.dashboard.gutter_wip_precedence
  definition: '`computeGutterModel(blocks, uncommitted)` returns a `GutterRow[]` where every line covered by an `uncommitted` range produces a row with `kind: "wip"` regardless of whether that line is also covered by a `blocks` entry, with every line covered only by a `blocks` entry producing a row with `kind: "commit"` carrying that block''s commit hash.'
  verifier: src/sdd/docs-dashboard/tests/overlay-model.test.ts::computeGutterModel
  requires:
    - methodology.dashboard.blame_uncommitted_lines_structured
  glossary_terms: []
  status: active
