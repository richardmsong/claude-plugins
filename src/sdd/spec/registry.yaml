  supersedes: methodology.registry.status_field
  glossary_terms: []
  status: active

- id: methodology.validator.registry_glossary_terms_field
  definition: The validator `CheckRegistryGlossaryTermsField` returns a `CheckError` for every registry entry whose `glossary_terms` field contains an empty or whitespace-only string element; returns no error for entries with a valid (possibly empty) string array.
  verifier: spec/checks_registry_test.go::TestCheckRegistryGlossaryTermsField
  supersedes: methodology.registry.glossary_terms_field
  glossary_terms: []
