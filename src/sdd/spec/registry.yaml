# 1. Registry schema (6 entries)
- id: methodology.validator.registry_id_field
  definition: The validator `CheckRegistryIDField` returns a `CheckError` for every registry entry whose `id` field does not match the regex `^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+$`, returns no error for entries whose `id` does match.
  verifier: spec/checks_registry_test.go::TestCheckRegistryIDField
  supersedes: methodology.registry.id_field
  glossary_terms: []
  status: active

- id: methodology.validator.registry_definition_field
  definition: The validator `CheckRegistryDefinitionField` returns a `CheckError` for every registry entry whose `definition` field is empty or contains newlines, returns no error for entries whose `definition` is a non-empty single-line string.
  verifier: spec/checks_registry_test.go::TestCheckRegistryDefinitionField
  supersedes: methodology.registry.definition_field
  glossary_terms: []
  status: active

- id: methodology.validator.registry_verifier_field
  definition: The validator `CheckRegistryVerifierField` returns a `CheckError` for every registry entry whose `verifier` field is empty, whose path segment is empty, or whose `::FuncName` suffix is empty; returns no error for entries with a valid verifier reference.
