# Methodology's own invariant registry.
# Day-1 contents per ADR-0078. Each entry's verifier exists in src/sdd/spec/.
#
# Schema (per ADR-0078):
#   id            : stable dotted-path string
#   definition    : one-line contract; no AND; substantive changes route through Supersession
#   comments      : optional free-form annotations; advisory; freely editable
#   verifier      : path[::TestFunc] reference
#   requires      : list of invariant IDs this verifier presupposes
#   supersedes    : optional ID this entry replaces (predecessor flips to withdrawn)
#   glossary_terms: list of terms in definition that need resolution
#   status        : active | withdrawn
#   manual_stability: optional override; values: stable | core
#
# Computed (not stored):
#   citation_count = |{Y : Y in Registry, X in Y.Requires}|
#   stability      = manual_stability OR (0 -> uncited; 1-2 -> stable; >=3 -> core)
#   superseded_by  = reverse lookup: any Y where Y.Supersedes == X.ID

